<div class="select-field" [class.select-field--error]="hasError">
  <label class="select-field__label" *ngIf="label">{{ label }}</label>
  <div class="select-field__wrapper">
    <select
      class="select-field__select"
      [value]="value"
      (change)="onSelect($event)"
      (blur)="onTouched()"
    >
      <option value="" disabled selected>{{ placeholder }}</option>
      <option *ngFor="let opt of options" [value]="opt.value">
        {{ opt.label }}
      </option>
    </select>
    <span class="select-field__arrow">&#9660;</span>
  </div>
</div>
