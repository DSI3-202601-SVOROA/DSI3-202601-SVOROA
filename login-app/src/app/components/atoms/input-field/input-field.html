<div class="input-field" [class.input-field--error]="hasError">
  <label class="input-field__label" *ngIf="label">{{ label }}</label>
  <div class="input-field__wrapper">
    <input
      class="input-field__input"
      [type]="inputType"
      [placeholder]="placeholder"
      [value]="value"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />
    <span class="input-field__icon" *ngIf="type === 'email'">@</span>
    <button
      type="button"
      class="input-field__toggle"
      *ngIf="type === 'password'"
      (click)="togglePassword()"
    >
      {{ showPassword ? 'Ocultar' : 'Ver' }}
    </button>
  </div>
</div>
