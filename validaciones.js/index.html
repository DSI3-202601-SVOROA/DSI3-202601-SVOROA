<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Workshop Práctico</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="formulario">

    <h2 class="formulario__titulo">Workshop Práctico</h2>

    <div class="formulario__grupo">
        <label class="formulario__label">Nombre</label>
        <input type="text" id="nombre" class="formulario__input">
    </div>

    <div class="formulario__grupo">
        <label class="formulario__label">Edad</label>
        <input type="number" id="edad" class="formulario__input">
    </div>

    <div class="formulario__grupo">
        <label class="formulario__label">Nota</label>
        <input type="number" id="nota" step="0.1" class="formulario__input">
    </div>

    <button onclick="validar()" class="formulario__boton">Enviar</button>

</div>

<script src="validaciones.js"></script>

</body>
</html>
