<h1>Partido Amistoso COLOMBIA vs BRASIL</h1>

<app-header
  [title]="'Colombia vs Brasil'"
  [description]="'Ingrese la cantidad de casos de prueba'"
  [label]="'Cantidad de casos (1-100)'"
  [actionName]="'Calcular'"
  (elements)="generarCasos($event)"
></app-header>

@if (error !== '') {
  <p class="error">{{ error }}</p>
}

@if (casos.length > 0) {
  @for (caso of casos; track $index) {
    <div class="caso">
      <span class="caso-titulo">Caso {{ $index + 1 }}</span>
      <div class="fila">
        <label>🇧🇷 Brasil:</label>
        <input type="number" [(ngModel)]="caso.brasil" min="0" placeholder="Goles"/>
        <label>🇨🇴 Colombia:</label>
        <input type="number" [(ngModel)]="caso.colombia" min="0" placeholder="Goles"/>
        <button (click)="calcular($index)">Calcular</button>
        <span class="resultado" [ngClass]="caso.clase">{{ caso.resultado }}</span>
      </div>
    </div>
  }
}
